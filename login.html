<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>Login</title>
</head>

<body>
    <header class="header">
        <a href="index.html">
            <img src="assets/ufchub-logo.png" class="logo">
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="#">Rankings</a>
            <a href="#">Simulador de Lutas</a>
            <a href="#">Estatísticas</a>
            <a href="#">Museu UFC</a>
            <a href="#"><span class="active">Login</span></a>
        </nav>
    </header>
    <section class="login-page">
        <div class="login-container">

            <h2>Entrar no <span>UFC Hub</span></h2>
            <p>Acesse sua conta para explorar o sistema</p>

            <form>
                <input type="email" placeholder="E-mail" required>
                <input type="password" placeholder="Senha" required>

                <button class="btn">Entrar</button>
            </form>

            <p class="register">
                Não tem conta? <a href="cadastro.html">Cadastre-se</a>
            </p>

        </div>
    </section>
    <footer class="footer">
        <p>© 2026 UFC Hub | Todos direitos reservados</p>
    </footer>

</body>

</html>
